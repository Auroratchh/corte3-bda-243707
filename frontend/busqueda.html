<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VetSys — Búsqueda de Mascotas</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--surface:#111827;--border:#1e2d40;--accent:#00d4aa;--accent2:#3b82f6;--text:#f0f6ff;--muted:#6b7fa3;--danger:#ef4444}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(0,212,170,.06) 0%,transparent 60%);pointer-events:none}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.nav-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px}
.nav-brand span{font-size:20px}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:7px 14px;font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;border-radius:8px;transition:background .2s,color .2s}
.nav-links a:hover{background:rgba(255,255,255,.05);color:var(--text)}
.nav-links a.active{background:rgba(0,212,170,.1);color:var(--accent)}
.session{font-family:'Fira Mono',monospace;font-size:11px;color:var(--muted);background:rgba(255,255,255,.04);padding:5px 12px;border-radius:6px;border:1px solid var(--border)}
.page{max-width:960px;margin:0 auto;padding:36px 24px}
.page-header{margin-bottom:28px}
.page-header h1{font-size:22px;font-weight:700;margin-bottom:4px}
.page-header p{font-size:14px;color:var(--muted)}
.search-row{display:flex;gap:10px;margin-bottom:28px}
.search-row input{flex:1;padding:13px 18px;background:#0d1525;border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s}
.search-row input::placeholder{color:var(--muted)}
.search-row input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,170,.1)}
.btn{padding:13px 24px;background:var(--accent);color:#0a0e1a;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;border:none;border-radius:10px;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn:hover{opacity:.85}
.count{font-size:13px;color:var(--muted);margin-bottom:12px}
.count span{color:var(--text);font-weight:600}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:rgba(0,212,170,.06);border-bottom:1px solid var(--border)}
thead th{padding:13px 18px;font-family:'Fira Mono',monospace;font-size:11px;color:var(--accent);text-align:left;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.02)}
tbody td{padding:14px 18px;font-size:14px;vertical-align:middle}
.id{font-family:'Fira Mono',monospace;font-size:12px;color:var(--muted)}
.badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:600}
.badge-perro{background:rgba(59,130,246,.15);color:#60a5fa}
.badge-gato{background:rgba(168,85,247,.15);color:#c084fc}
.badge-conejo{background:rgba(34,197,94,.15);color:#4ade80}
.badge-otro{background:rgba(107,127,163,.15);color:var(--muted)}
.dot-ok{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#4ade80}
.dot-ok::before{content:'';width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80}
.empty{text-align:center;padding:60px 24px;color:var(--muted)}
.empty .icon{font-size:40px;margin-bottom:12px}
.empty p{font-size:13px;font-family:'Fira Mono',monospace}
.error-bar{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px 16px;color:#fca5a5;font-size:13px;font-weight:600;margin-bottom:16px;display:none}
</style>
</head>
<body>
<nav>
  <div class="nav-brand"><span>🐾</span> VetSys</div>
  <div class="nav-links">
    <a href="busqueda.html" class="active">Mascotas</a>
    <a href="vacunacion.html">Vacunación</a>
    <a href="login.html">Salir</a>
  </div>
  <div class="session" id="session-label">—</div>
</nav>

<div class="page">
  <div class="page-header">
    <h1>Búsqueda de Mascotas</h1>
    <p>Busca por nombre — el campo es la superficie de prueba para SQL Injection</p>
  </div>

  <div class="search-row">
    <input type="text" id="q" placeholder="Nombre de la mascota... ej: Firulais" maxlength="200">
    <button class="btn" id="btn-buscar">Buscar</button>
  </div>

  <div class="error-bar" id="error-bar"></div>
  <div class="count">Mostrando <span id="count">0</span> resultados</div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Especie</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="4"><div class="empty"><div class="icon">🔍</div><p>Cargando...</p></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="js/config.js"></script>
<script>
if (!sessionStorage.getItem('rol')) { window.location.replace('login.html'); }
const rol = sessionStorage.getItem('rol');
const vet_id = parseInt(sessionStorage.getItem('vet_id')) || 0;
document.getElementById('session-label').textContent = rol.replace('rol_','') + (vet_id ? ` #${vet_id}` : '');

function badge(especie) {
  const e = (especie||'').toLowerCase();
  const map = {perro:'badge-perro',gato:'badge-gato',conejo:'badge-conejo'};
  return `<span class="badge ${map[e]||'badge-otro'}">${especie}</span>`;
}

function render(data) {
  document.getElementById('count').textContent = data.length;
  const tbody = document.getElementById('tbody');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="4"><div class="empty"><div class="icon">🔍</div><p>Sin resultados</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(m => `
    <tr>
      <td class="id">#${String(m.id).padStart(4,'0')}</td>
      <td><strong>${m.nombre}</strong></td>
      <td>${badge(m.especie)}</td>
      <td><span class="dot-ok">Activo</span></td>
    </tr>
  `).join('');
}

function showError(msg) {
  const e = document.getElementById('error-bar');
  e.textContent = msg; e.style.display = 'block';
}

async function cargar(q) {
  document.getElementById('error-bar').style.display = 'none';
  const headers = {'x-rol': rol, 'x-vet-id': String(vet_id)};
  try {
    const url = q
      ? `${CONFIG.API_URL}/mascotas/search?q=${encodeURIComponent(q)}`
      : `${CONFIG.API_URL}/mascotas`;
    const res = await fetch(url, {headers});
    if (!res.ok) throw new Error(`Error ${res.status}`);
    render(await res.json());
  } catch(e) {
    showError('Error al conectar con la API. Verifica que esté corriendo en ' + CONFIG.API_URL);
    document.getElementById('tbody').innerHTML = `<tr><td colspan="4"><div class="empty"><p>Sin conexión</p></div></td></tr>`;
  }
}

document.getElementById('btn-buscar').addEventListener('click', () => {
  cargar(document.getElementById('q').value.trim());
});
document.getElementById('q').addEventListener('keydown', e => {
  if (e.key === 'Enter') cargar(document.getElementById('q').value.trim());
});

cargar('');
</script>
</body>
</html>
